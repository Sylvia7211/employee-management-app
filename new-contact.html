<!DOCTYPE html>
<html>
<head>
  <title>New Contact</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>


<header class="header">
  <div class="logo">EMS</div>
  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="new-contact.html">New Contact</a>
    <a href="view-contacts.html">View Contacts</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h1>Add a New Employee</h1>
    <p style="font-size:1.1rem; max-width:600px; margin: 0 auto;">Fill in the form below to add a new employee to your organization’s contact list.</p>
  </div>
</section>

<section class="content">
  <h2>Employee Details</h2>
  <form class="form" action="https://formspree.io/f/mlgojvwr" method="post">
    <input type="text" name="fullName" placeholder="Full Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="text" name="phone" placeholder="Phone Number">
    <input type="text" name="department" placeholder="Department">
    <input type="text" name="position" placeholder="Position">
    <button type="submit">Submit</button>
  </form>
</section>


<footer class="footer">
  &copy; 2026 Employee Management App
</footer>

</script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const form = document.querySelector('.form');
    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const formData = new FormData(form);
      const data = {};
      formData.forEach((value, key) => {
        data[key] = value;
      });
      try {
        const response = await fetch(form.action, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify(data)
        });
        if (response.ok) {
          alert('Thank you! Your submission has been received.');
          form.reset();
        } else {
          alert('There was a problem submitting your form.');
        }
      } catch (error) {
        alert('There was a problem submitting your form.');
      }
    });
  });
</script>
<script src="main.js"></script>
</body>
</html>
