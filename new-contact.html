<!DOCTYPE html>
<html>
<head>
  <title>New Contact</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>


<header class="header">
  <div class="logo">EMS</div>
  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="new-contact.html">New Contact</a>
    <a href="view-contacts.html">View Contacts</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h1>Add a New Employee</h1>
    <p style="font-size:1.1rem; max-width:600px; margin: 0 auto;">Fill in the form below to add a new employee to your organization’s contact list.</p>
  </div>
</section>

<section class="content">
  <h2>Employee Details</h2>
  <form class="form" action="#" method="post">
    <input type="text" name="idNumber" placeholder="Enter Identification Number" required>
    <input type="text" name="firstname" placeholder="Enter First Name" required>
    <input type="text" name="lastname" placeholder="Enter Last Name" required>
    <div class="form-group gender-group">
      <label>Gender</label>
      <label><input type="radio" name="gender" value="Male" required> Male</label>
      <label><input type="radio" name="gender" value="Female"> Female</label>
    </div>
    <input type="text" name="phone" placeholder="+2547---" required>
    <input type="email" name="email" placeholder="Enter Email" required>
    <input type="text" name="address" placeholder="Enter Address">
    <input type="date" name="dob" placeholder="mm/dd/yyyy">
    <select name="position" required>
      <option value="">- Select Position if Official -</option>
      <option value="Manager">Manager</option>
      <option value="HR">HR</option>
      <option value="Developer">Developer</option>
      <option value="Designer">Designer</option>
      <option value="Other">Other</option>
    </select>
    <button type="submit">Submit</button>
  </form>
</section>


<footer class="footer">
  &copy; 2026 Employee Management App
</footer>

</script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const form = document.querySelector('.form');
    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const formData = new FormData(form);
      const data = {};
      formData.forEach((value, key) => {
        data[key] = value;
      });
      try {
        const response = await fetch(form.action, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify(data)
        });
        if (response.ok) {
          alert('Thank you! Your submission has been received.');
          form.reset();
        } else {
          alert('There was a problem submitting your form.');
        }
      } catch (error) {
        alert('There was a problem submitting your form.');
      }
    });
  });
</script>
<script src="main.js"></script>
</body>
</html>
